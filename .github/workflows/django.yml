name: Django CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: portfolio_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_test
          SECRET_KEY: django-insecure-testing-key
          DEBUG: True
        run: |
          cd backend
          python manage.py migrate --fake-initial
          python manage.py test

      - name: Lint with black
        run: |
          cd backend
          black --check .
          echo "Black linting passed"

      - name: Lint with flake8
        run: |
          cd backend
          flake8 . 
          echo "Flake8 linting passed"

      - name: Security scan
        run: |
          cd backend
          pip install bandit
          bandit -r backend/

      # - name: Upload coverage (optional, requires codecov token)
      #   uses: codecov/codecov-action@v4
      #   with:
      #     file: backend/coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bandit Security Scan
        run: |
          pip install bandit>=1.7.3
          cd backend
          bandit -r . --format github || true

  deploy-staging:
    name: Deploy to Staging
    needs: [test, security]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway/Heroku
        run: echo 'Deploy script here'
